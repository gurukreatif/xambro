name: Build EzamBro APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nama Aplikasi (tampil di launcher)'
        required: true
        default: 'Emes Exam Browser'
      app_title:
        description: 'Judul Header Layar Utama'
        required: true
        default: 'Emes Exam Browser'
      app_description:
        description: 'Subtitle di bawah judul'
        required: true
        default: 'Safe browsing untuk ujian online'
      exit_pin:
        description: 'PIN Pengawas untuk keluar ujian'
        required: true
        default: '1234'
      header_color:
        description: 'Warna Header (hex, tanpa #) — diabaikan jika header_image diisi'
        required: true
        default: '1A3A5C'
      header_image:
        description: 'Background gambar header (base64 PNG/JPG, kosongkan jika pakai warna)'
        required: false
        default: ''
      button_color:
        description: 'Warna Tombol Utama (hex, tanpa #)'
        required: true
        default: '2E7BF6'
      package_id:
        description: 'Package ID Android (contoh: id.sekolah.exambrowser)'
        required: true
        default: 'id.emes.exambrowser'
      version_name:
        description: 'Versi APK (contoh: 1.2.0)'
        required: true
        default: '1.1.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply configuration from inputs
        env:
          APP_NAME:        ${{ github.event.inputs.app_name        || 'Emes Exam Browser' }}
          APP_TITLE:       ${{ github.event.inputs.app_title       || 'Emes Exam Browser' }}
          APP_DESCRIPTION: ${{ github.event.inputs.app_description || 'Safe browsing untuk ujian online' }}
          EXIT_PIN:        ${{ github.event.inputs.exit_pin        || '1234' }}
          HEADER_COLOR:    ${{ github.event.inputs.header_color    || '1A3A5C' }}
          HEADER_IMAGE:    ${{ github.event.inputs.header_image    || '' }}
          BUTTON_COLOR:    ${{ github.event.inputs.button_color    || '2E7BF6' }}
          PACKAGE_ID:      ${{ github.event.inputs.package_id      || 'id.emes.exambrowser' }}
          VERSION_NAME:    ${{ github.event.inputs.version_name    || '1.1.0' }}
        run: python scripts/apply_config.py

      - name: Setup launcher icons
        run: |
          cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          mkdir -p app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-mdpi
          cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-mdpi/ic_launcher_round.png

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK with app name + version
        run: |
          APP="${{ github.event.inputs.app_name || 'EzamBro' }}"
          VER="${{ github.event.inputs.version_name || '1.1.0' }}"
          SAFE=$(echo "$APP" | sed 's/[^a-zA-Z0-9]/-/g')
          mv app/build/outputs/apk/debug/app-debug.apk \
             "app/build/outputs/apk/debug/${SAFE}-v${VER}-debug.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK-Build
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Show download info
        run: |
          echo "✅ Build selesai!"
          echo "📦 APK tersedia di tab Actions > Artifacts > APK-Build"
          echo "🏷 Versi: ${{ github.event.inputs.version_name || '1.1.0' }}"
          echo "📱 Package: ${{ github.event.inputs.package_id || 'id.emes.exambrowser' }}"
